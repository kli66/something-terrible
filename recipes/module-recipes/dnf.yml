modules:
  - type: dnf
    repos:
      copr:
        - scottames/ghostty
        - avengemedia/dms
      files:
        - https://negativo17.org/repos/fedora-multimedia.repo
      keys:
        - https://negativo17.org/repos/RPM-GPG-KEY-slaanesh
    group-install:
      packages:
        - multimedia
        - development-tools
    install:
      packages:
        - neovim
        - ripgrep
        - fd-find
        - fcitx5
        - fcitx5-rime
        - fcitx5-chinese-addons
        - fcitx5-configtool
        - fcitx5-gtk
        - fcitx5-qt
        - fcitx5-qt6
        - librime-lua
        - wdisplays
        - ghostty
        - niri
        - grim
        - slurp
        - swappy
        - qt6ct
        - kernel-devel-matched
        - displaylink
      exclude:
        - alacritty
        - waybar
        - fuzzel

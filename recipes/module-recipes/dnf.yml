modules:
  - type: dnf
    repos:
      nonfree: rpmfusion
      copr:
        - scottames/ghostty
        - avengemedia/dms
    group-install:
      packages:
        - multimedia
        - development-tools
    install:
      packages:
        - neovim
        - emacs-pgtk
        - emacsclient
        - clang-tools-extra
        - ripgrep
        - fd-find
        - distrobox
        - podman-docker
        - podman-compose
        - fcitx5
        - fcitx5-rime
        - fcitx5-chinese-addons
        - fcitx5-configtool
        - fcitx5-gtk
        - fcitx5-qt
        - fcitx5-qt6
        - librime-lua
        - wdisplays
        - ghostty
        - niri
        - xwayland-satellite
        - grim
        - slurp
        - swappy
        - xdg-desktop-portal-kde
        - qt6ct
        - greetd
        - greetd-selinux
        - tuigreet
      exclude:
        - alacritty
        - waybar
        - fuzzel

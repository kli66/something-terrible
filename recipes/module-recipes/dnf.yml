modules:
  - type: dnf
    repos:
      nonfree: rpmfusion
      copr:
        - scottames/ghostty
        - avengemedia/dms
    group-install:
      packages:
        - multimedia
        - development-tools
    install:
      packages:
        - neovim
        - emacs-pgtk
        - emacsclient
        - clang-tools-extra
        - ripgrep
        - fd-find
        - distrobox
        - podman-docker
        - podman-compose
        - fcitx5
        - fcitx5-rime
        - fcitx5-chinese-addons
        - fcitx5-configtool
        - fcitx5-gtk
        - fcitx5-qt
        - fcitx5-qt6
        - librime-lua
        - wdisplays
        - ghostty
        - kitty
        - niri
        - xwayland-satellite
        - ImageMagick
        - img2pdf
        - xdg-desktop-portal-kde
        - qt6ct
        - adw-gtk3-theme
        - greetd
        - greetd-selinux
        - tuigreet
        # DankMaterialShell (DMS) shell + greeter. Only `dms` lives in the
        # avengemedia/dms COPR; the rest (quickshell-git, dms-greeter, danksearch,
        # dankcalendar-git) come from avengemedia/danklinux, enabled transitively
        # as a coprdep of dms.
        # Use quickshell-git, NOT plain quickshell 0.3.0: danklinux's quickshell-git
        # (0.3.1^git) Provides+Conflicts quickshell, and `dms` now requires the -git
        # build, so pinning 0.3.0 makes the two collide at install time. 0.3.1^git is
        # newer than 0.3.0 and still carries the 2026-04-06 pipewire fix.
        # Still NOT noctalia's noctalia-qs fork — noctalia-shell stays out of
        # scripts.yml so nothing pulls noctalia-qs (which also Provides quickshell).
        - dms
        - dms-greeter
        - quickshell-git
        - danksearch
        - dankcalendar-git
        # Btrfs snapshots of /var/home. Config + first-boot subvolume init are
        # shipped via files.yml; timers enabled in systemd.yml.
        # (btrfs-assistant is the GUI front-end.)
        - snapper
        - btrfs-assistant
      exclude:
        - alacritty
        - waybar
        - fuzzel

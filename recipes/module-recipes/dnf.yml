modules:
  - type: dnf
    repos:
      nonfree: rpmfusion
      copr:
        - scottames/ghostty
        - avengemedia/dms
    group-install:
      packages:
        - multimedia
        - development-tools
    install:
      packages:
        - neovim
        - ripgrep
        - fd-find
        - fcitx5
        - fcitx5-rime
        - fcitx5-chinese-addons
        - fcitx5-configtool
        - fcitx5-gtk
        - fcitx5-qt
        - fcitx5-qt6
        - librime-lua
        - wdisplays
        - ghostty
        - niri
        - grim
        - slurp
        - hyprpicker
        - wl-clipboard
        - tesseract
        - tesseract-langpack-eng
        - ImageMagick
        - zbar
        - curl
        - translate-shell
        - ffmpeg
        - jq
        - wl-screenrec
        - python3
        - python3-gobject
        - xdg-desktop-portal
      exclude:
        - alacritty
        - waybar
        - fuzzel

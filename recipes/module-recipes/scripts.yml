modules:
  - type: script
    snippets:
      - |
        set -oue pipefail

        # Install Bettbox (pinned v1.18.6, 2026-07-21)
        # To update: browse https://github.com/appshubcc/Bettbox/releases, copy new RPM URL
        BETTBOX_URL="https://github.com/appshubcc/Bettbox/releases/download/v1.18.6/Bettbox-1.18.6-linux-amd64.rpm"
        echo "Installing Bettbox from: ${BETTBOX_URL}"
        dnf5 install -y "${BETTBOX_URL}"
        chmod u+s /usr/share/Bettbox/BettboxCore

        # Install CC Switch (pinned v3.17.0, 2026-07-13)
        # To update: browse https://github.com/farion1231/cc-switch/releases, copy new RPM URL
        CC_SWITCH_URL="https://github.com/farion1231/cc-switch/releases/download/v3.17.0/CC-Switch-v3.17.0-Linux-x86_64.rpm"
        echo "Installing CC Switch from: ${CC_SWITCH_URL}"
        dnf5 install -y "${CC_SWITCH_URL}"

        # Install Bitwarden Desktop (vendor redirects to latest; pin optional)
        # Bitwarden's download endpoint redirects to the current stable RPM.
        # Layer only changes when Bitwarden ships a new release.
        BITWARDEN_URL="https://bitwarden.com/download/?app=desktop&platform=linux&variant=rpm"
        BITWARDEN_RPM="/tmp/bitwarden-desktop.rpm"
        echo "Installing Bitwarden Desktop from: ${BITWARDEN_URL}"
        curl -fL "${BITWARDEN_URL}" -o "${BITWARDEN_RPM}"
        test -s "${BITWARDEN_RPM}"
        dnf5 install -y "${BITWARDEN_RPM}"
        rm -f "${BITWARDEN_RPM}"

        # Enable terra repo and install packages
        # Only nwg-look and zed still need terra (neither is in Fedora or the DMS COPRs).
        # adw-gtk3-theme moved to dnf.yml (it's in Fedora 44 proper).
        # noctalia-shell was dropped here — the shell is now DankMaterialShell (DMS),
        # installed via dnf.yml (dms COPR + danklinux coprdep) on quickshell-git 0.3.1^git.
        # Do NOT reintroduce noctalia-shell: it hard-requires noctalia-qs, whose bundled
        # quickshell fork also Provides+Conflicts quickshell and would break the DMS install.
        dnf5 install -y --nogpgcheck --repofrompath 'terra-bootstrap,https://repos.fyralabs.com/terra$releasever' --repo terra-bootstrap terra-release
        sed -i 's/^enabled=0/enabled=1/' /etc/yum.repos.d/terra*.repo
        dnf5 install -y nwg-look zed
        sed -i 's/^enabled=1/enabled=0/' /etc/yum.repos.d/terra*.repo

        # Install Chipmunk (pinned v4.0.1, 2026-06-12)
        # To update: browse https://github.com/esrlabs/chipmunk/releases, copy new RPM URL
        CHIPMUNK_URL="https://github.com/esrlabs/chipmunk/releases/download/4.0.1/chipmunk%404.0.1-linux-x86_64.rpm"
        echo "Installing Chipmunk from: ${CHIPMUNK_URL}"
        dnf5 install -y "${CHIPMUNK_URL}"

        dnf5 clean all

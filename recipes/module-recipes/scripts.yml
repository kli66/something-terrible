modules:
  - type: script
    no-cache: true
    snippets:
      - |
        set -oue pipefail

        # Install Bettbox
        echo "Fetching latest Bettbox release..."
        BETTBOX_URL="$(curl -fsSL https://api.github.com/repos/appshubcc/Bettbox/releases/latest | sed -nE 's/.*"browser_download_url": "([^"]+Bettbox-[^"]+-linux-amd64\.rpm)".*/\1/p' | head -n 1)"
        test -n "${BETTBOX_URL}" && test "${BETTBOX_URL}" != "null"
        echo "Installing from: ${BETTBOX_URL}"
        dnf5 install -y "${BETTBOX_URL}"
        chmod u+s /usr/share/Bettbox/BettboxCore

        # Install CC Switch
        echo "Fetching latest CC Switch release..."
        CC_SWITCH_URL="$(curl -fsSL https://api.github.com/repos/farion1231/cc-switch/releases/latest | sed -nE 's/.*"browser_download_url": "([^"]+Linux-x86_64\.rpm)".*/\1/p' | head -n 1)"
        test -n "${CC_SWITCH_URL}" && test "${CC_SWITCH_URL}" != "null"
        echo "Installing from: ${CC_SWITCH_URL}"
        dnf5 install -y "${CC_SWITCH_URL}"

        # Install Bitwarden Desktop
        echo "Fetching latest Bitwarden Desktop RPM..."
        BITWARDEN_URL="https://bitwarden.com/download/?app=desktop&platform=linux&variant=rpm"
        BITWARDEN_RPM="/tmp/bitwarden-desktop.rpm"
        curl -fL "${BITWARDEN_URL}" -o "${BITWARDEN_RPM}"
        test -s "${BITWARDEN_RPM}"
        dnf5 install -y "${BITWARDEN_RPM}"
        rm -f "${BITWARDEN_RPM}"

        # Enable terra repo and install packages
        # Only nwg-look and zed still need terra (neither is in Fedora or the DMS COPRs).
        # adw-gtk3-theme moved to dnf.yml (it's in Fedora 44 proper).
        # noctalia-shell was dropped here — the shell is now DankMaterialShell (DMS),
        # installed from the avengemedia/dms COPR in dnf.yml on upstream quickshell 0.3.0.
        # Do NOT reintroduce noctalia-shell: it hard-requires noctalia-qs, whose bundled
        # quickshell fork conflicts with upstream quickshell and lacks the pipewire crash fix.
        dnf5 install -y --nogpgcheck --repofrompath 'terra-bootstrap,https://repos.fyralabs.com/terra$releasever' --repo terra-bootstrap terra-release
        sed -i 's/^enabled=0/enabled=1/' /etc/yum.repos.d/terra*.repo
        dnf5 install -y nwg-look zed
        sed -i 's/^enabled=1/enabled=0/' /etc/yum.repos.d/terra*.repo

        # Install Chipmunk
        echo "Fetching latest Chipmunk release..."
        CHIPMUNK_URL="$(curl -fsSL https://api.github.com/repos/esrlabs/chipmunk/releases/latest | sed -nE 's/.*"browser_download_url": "([^"]+chipmunk%40[^"]+-linux-x86_64\.rpm)".*/\1/p' | head -n 1)"
        test -n "${CHIPMUNK_URL}" && test "${CHIPMUNK_URL}" != "null"
        echo "Installing from: ${CHIPMUNK_URL}"
        dnf5 install -y "${CHIPMUNK_URL}"

        dnf5 clean all

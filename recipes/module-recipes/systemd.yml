type: systemd
system:
  enabled:
    - greetd.service
  disabled:
    - plasmalogin.service
  masked:
    # Mask systemd-remount-fs.service to prevent boot failures on Fedora Atomic 42+
    # This service fails when trying to reconfigure composefs overlay mounts
    # See: https://bugzilla.redhat.com/show_bug.cgi?id=2348934
    - systemd-remount-fs.service
user:
  enabled:
    # DankMaterialShell as a systemd user service (enabled via `systemctl --global`).
    # dms.service ships with the dms package: WantedBy=graphical-session.target and
    # Requisite=graphical-session.target. niri (launched via niri-session /
    # /usr/share/wayland-sessions/niri.desktop) establishes that target, so DMS starts
    # with the niri session and restarts on crash (Restart=on-failure). The Requisite
    # guard keeps it from starting in the greeter's bare-niri session.
    # IMPORTANT: because DMS is started by systemd here, the niri config must NOT also
    # `spawn "dms" "run"` — that would launch DMS twice. Niri startup/keybinds live in the
    # user dotfile ~/.config/niri/config.kdl (not baked into this image).
    - dms.service
